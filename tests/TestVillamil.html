 <!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindAR Local Test</title>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <link rel="stylesheet" href="../Styles/Design1.css">
  </head>
  <body>
    <div id="ar-container"></div>

    <div class="hud">
      <section class="panel">
        <h1>MindAR + Three.js</h1>
        <p>
          Presiona iniciar, apunta la webcam al marcador y verás un objeto 3D de prueba.
          El target se carga desde <strong>Assets/Targets/targets.mind</strong>.
        </p>
      </section>

      <section class="panel controls status">
        <button id="start-ar">Iniciar camara AR</button>
        <button id="stop-ar">Detener camara AR</button>
        <p id="status-text">Esperando inicio.</p>

      </section>
    </div>

    <script type="module" src="../JS/TestVillamil.js"></script>
  </body>
  
</html>
